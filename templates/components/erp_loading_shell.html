{# Global full-screen loading overlay (ErpLoading.show/hide) #}
<div id="erp-loading-overlay" hidden aria-hidden="true" role="status" aria-live="polite">
  <div class="erp-loading-card">
    <div class="erp-loading-spinner-wrap" aria-hidden="true">
      <div class="erp-loading-dots">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <p class="erp-loading-title">Loading…</p>
    <p class="erp-loading-sub">This will only take a moment.</p>
  </div>
</div>
