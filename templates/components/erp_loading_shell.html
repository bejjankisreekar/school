{% comment %}
  Global loading UI: top progress bar + full-screen overlay.
  Controlled by static/js/loading-system.js (window.SchoolERPLoading).
{% endcomment %}
<div id="erp-nav-progress" class="erp-nav-progress" aria-hidden="true">
  <div class="erp-nav-progress__bar"></div>
</div>
<div id="erp-loading-overlay" class="erp-loading-overlay" aria-hidden="true" role="status" aria-live="polite">
  <div class="erp-loading-overlay__backdrop"></div>
  <div class="erp-loading-overlay__content">
    <div class="erp-spinner" aria-hidden="true"></div>
    <p class="erp-loading-overlay__text" id="erp-loading-overlay-text">Loading…</p>
  </div>
</div>
