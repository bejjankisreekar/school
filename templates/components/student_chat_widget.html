{% if request.user.is_authenticated and request.user.role == "STUDENT" %}
<style>
  .scw {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 2147483000;
    font-family: inherit;
  }
  .scw-btn {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    border: 0;
    background: linear-gradient(135deg, #2563eb 0%, #7c3aed 55%, #4338ca 100%);
    color: #fff;
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.22);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .scw-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    border-radius: 999px;
    background: #ef4444;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    display: none;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255,255,255,0.9);
  }
  .scw-panel {
    position: absolute;
    right: 0;
    bottom: 70px;
    width: 340px;
    height: 460px;
    border-radius: 16px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.20);
    overflow: hidden;
    transform: translateY(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease, transform 160ms ease;
    display: flex;
    flex-direction: column;
  }
  html.dark .scw-panel, body.dark-mode .scw-panel {
    background: rgba(15, 23, 42, 0.85);
    border-color: rgba(71, 85, 105, 0.55);
    box-shadow: 0 28px 70px rgba(0,0,0,0.45);
  }
  .scw.is-open .scw-panel {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .scw-head {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(148,163,184,0.20);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .scw-title { font-weight: 900; letter-spacing: -0.01em; }
  .scw-close {
    border: 0;
    background: transparent;
    color: inherit;
    padding: 4px 6px;
  }
  .scw-toolbar {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(148,163,184,0.18);
  }
  .scw-body {
    flex: 1;
    overflow: auto;
    padding: 12px;
    background: linear-gradient(180deg, rgba(148,163,184,0.06), transparent);
  }
  .scw-bub {
    max-width: 78%;
    border-radius: 14px;
    padding: 8px 10px;
    border: 1px solid rgba(148,163,184,0.22);
    background: rgba(255,255,255,0.75);
    box-shadow: 0 10px 18px rgba(15,23,42,0.08);
    white-space: pre-wrap;
  }
  html.dark .scw-bub, body.dark-mode .scw-bub { background: rgba(15,23,42,0.45); box-shadow: 0 14px 26px rgba(0,0,0,0.35); }
  .scw-bub.me { margin-left: auto; background: rgba(37,99,235,0.12); border-color: rgba(37,99,235,0.22); }
  .scw-bub.them { margin-right: auto; }
  .scw-ts { font-size: 11px; color: var(--bs-secondary-color); margin-top: 4px; }
  .scw-foot {
    padding: 10px 12px;
    border-top: 1px solid rgba(148,163,184,0.18);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .scw-input { flex: 1; }
  @media (max-width: 420px) {
    .scw-panel { width: calc(100vw - 24px); right: -8px; }
  }
</style>

<div class="scw" id="scwRoot" aria-live="polite">
  <button class="scw-btn" id="scwBtn" type="button" aria-label="Open messages">
    <i class="bi bi-chat-dots fs-4"></i>
    <span class="scw-badge" id="scwBadge">0</span>
  </button>

  <div class="scw-panel" role="dialog" aria-modal="false" aria-label="Messages widget">
    <div class="scw-head">
      <div class="d-flex align-items-center gap-2">
        <span class="scw-title">Messages</span>
        <a class="small text-decoration-none" href="{% url 'core:student_messages' %}">Open</a>
      </div>
      <button class="scw-close" id="scwClose" type="button" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="scw-toolbar">
      <select class="form-select form-select-sm" id="scwTeacher">
        <option value="">Select teacher</option>
      </select>
      <div class="text-muted small mt-1" id="scwTeacherMeta"></div>
    </div>

    <div class="scw-body" id="scwBody">
      <div class="text-muted small">Select a teacher to start chatting.</div>
    </div>

    <form class="scw-foot" id="scwForm">
      {% csrf_token %}
      <input class="form-control form-control-sm scw-input" id="scwInput" placeholder="Type a message..." autocomplete="off" />
      <button class="btn btn-primary btn-sm rounded-pill px-3" id="scwSend" type="submit">
        <i class="bi bi-send"></i>
      </button>
    </form>
  </div>
</div>

<script>
  (function () {
    var root = document.getElementById("scwRoot");
    if (!root) return;
    var btn = document.getElementById("scwBtn");
    var closeBtn = document.getElementById("scwClose");
    var sel = document.getElementById("scwTeacher");
    var meta = document.getElementById("scwTeacherMeta");
    var body = document.getElementById("scwBody");
    var form = document.getElementById("scwForm");
    var input = document.getElementById("scwInput");
    var badge = document.getElementById("scwBadge");

    var state = { loaded: false, activeTeacher: "", teachers: [] };

    function getCookie(name) {
      var v = document.cookie.match("(^|;)\\s*" + name + "\\s*=\\s*([^;]+)");
      return v ? v.pop() : "";
    }

    function setOpen(open) {
      if (open) root.classList.add("is-open");
      else root.classList.remove("is-open");
    }

    function scrollToBottom() {
      try { body.scrollTop = body.scrollHeight; } catch (e) {}
    }

    function renderMessages(msgs) {
      if (!msgs || !msgs.length) {
        body.innerHTML = '<div class="text-muted small">No messages yet.</div>';
        return;
      }
      var html = "";
      for (var i = 0; i < msgs.length; i++) {
        var m = msgs[i];
        html += '<div class="mb-2">';
        html += '<div class="scw-bub ' + (m.from_me ? "me" : "them") + '">';
        html += (m.content || "").replace(/[&<>]/g, function (c) { return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; });
        html += '<div class="scw-ts">' + (m.ts || "") + "</div>";
        html += "</div></div>";
      }
      body.innerHTML = html;
      scrollToBottom();
    }

    function updateBadge() {
      var n = 0;
      for (var i = 0; i < state.teachers.length; i++) n += (state.teachers[i].unread || 0);
      if (n > 0) {
        badge.textContent = String(n);
        badge.style.display = "inline-flex";
      } else {
        badge.style.display = "none";
      }
    }

    function loadTeachers() {
      return fetch("{% url 'core:student_messages_api_teachers' %}", { credentials: "same-origin" })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          state.teachers = (data && data.teachers) ? data.teachers : [];
          var opt = '<option value="">Select teacher</option>';
          for (var i = 0; i < state.teachers.length; i++) {
            var t = state.teachers[i];
            opt += '<option value="' + t.id + '">' + (t.name || t.username || "Teacher") + '</option>';
          }
          sel.innerHTML = opt;
          updateBadge();
          state.loaded = true;
        });
    }

    function loadThread(teacherId) {
      if (!teacherId) return;
      body.innerHTML = '<div class="text-muted small">Loading…</div>';
      return fetch("{% url 'core:student_messages_api_thread' %}?teacher=" + encodeURIComponent(teacherId), { credentials: "same-origin" })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          renderMessages((data && data.messages) ? data.messages : []);
          // clear unread for this teacher locally
          for (var i = 0; i < state.teachers.length; i++) {
            if (String(state.teachers[i].id) === String(teacherId)) state.teachers[i].unread = 0;
          }
          updateBadge();
        });
    }

    btn.addEventListener("click", function () {
      var isOpen = root.classList.contains("is-open");
      setOpen(!isOpen);
      if (!state.loaded) {
        loadTeachers();
      }
    });
    closeBtn.addEventListener("click", function () { setOpen(false); });

    sel.addEventListener("change", function () {
      state.activeTeacher = sel.value || "";
      var t = null;
      for (var i = 0; i < state.teachers.length; i++) if (String(state.teachers[i].id) === String(state.activeTeacher)) t = state.teachers[i];
      meta.textContent = (t && t.subjects_display) ? ("Subjects: " + t.subjects_display) : "";
      if (!state.activeTeacher) {
        body.innerHTML = '<div class="text-muted small">Select a teacher to start chatting.</div>';
        return;
      }
      loadThread(state.activeTeacher);
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var teacherId = state.activeTeacher || sel.value || "";
      var text = (input.value || "").trim();
      if (!teacherId || !text) return;
      var fd = new FormData();
      fd.append("teacher", teacherId);
      fd.append("content", text);
      fetch("{% url 'core:student_messages_api_send' %}", {
        method: "POST",
        body: fd,
        credentials: "same-origin",
        headers: { "X-CSRFToken": getCookie("csrftoken") }
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.ok) return;
        input.value = "";
        loadThread(teacherId);
      });
    });
  })();
</script>
{% endif %}
