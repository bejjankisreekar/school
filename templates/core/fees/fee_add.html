{% extends "base.html" %}
{% block title %}Generate Fees | School ERP{% endblock %}
{% block content %}
<div class="container-fluid px-0">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'core:admin_dashboard' %}">Dashboard</a></li>
      <li class="breadcrumb-item"><a href="{% url 'core:school_fees_index' %}">Fees</a></li>
      <li class="breadcrumb-item active">Generate Fees</li>
    </ol>
  </nav>
  <h1 class="h4 fw-bold mb-4">Generate Fees</h1>

  <div class="card border-0 shadow-sm" style="max-width: 32rem;">
    <div class="card-body">
      <h5 class="card-title mb-3">Create fee dues for students</h5>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Fee Structure</label>
          <select name="fee_structure" class="form-select form-control" required>
            <option value="">-- Select --</option>
            {% for s in structures %}
            <option value="{{ s.id }}">{{ s.fee_type.name }}{% if s.classroom %} - {{ s.classroom }}{% endif %} ({{ s.amount }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Classroom <span class="text-muted">(optional - leave blank for all)</span></label>
          <select name="classroom" class="form-select form-control">
            <option value="">All classrooms</option>
            {% for c in classrooms %}
            <option value="{{ c.id }}">{{ c.name }}{% if c.section %} - {{ c.section }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Due Date</label>
          <input type="date" name="due_date" class="form-control" required>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Generate Fees</button>
          <a href="{% url 'core:school_fee_collection' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
