{% extends "base.html" %}
{% block title %}{{ title }} | School ERP{% endblock %}
{% block content %}
<div class="container-fluid px-0">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'core:admin_dashboard' %}">Dashboard</a></li>
      <li class="breadcrumb-item"><a href="{% url 'core:school_inventory_index' %}">Inventory</a></li>
      <li class="breadcrumb-item active">{{ title }}</li>
    </ol>
  </nav>
  <h1 class="h4 fw-bold mb-4">{{ title }}</h1>

  <div class="card border-0 shadow-sm" style="max-width: 32rem;">
    <div class="card-body">
      {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{% url 'core:school_inventory_index' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
