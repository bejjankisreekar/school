{% extends "base.html" %}
{% block title %}Something went wrong | School ERP{% endblock %}
{% block content %}
<div class="container-fluid px-0" style="max-width: 980px;">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4 p-lg-5">
      <div class="d-flex align-items-start gap-3">
        <div class="rounded-4 d-inline-flex align-items-center justify-content-center"
             style="width:3.25rem;height:3.25rem;background:rgba(99,102,241,0.12);color:#4f46e5;">
          <i class="bi bi-shield-exclamation fs-3"></i>
        </div>
        <div class="min-w-0">
          <h1 class="h4 fw-bold mb-1">Something went wrong</h1>
          <p class="text-muted mb-3">We couldn’t load this page right now. Please try again.</p>
          <div class="d-flex flex-wrap gap-2">
            <a href="{% url 'core:admin_dashboard' %}" class="btn btn-primary rounded-pill px-4">
              <i class="bi bi-house-door me-2"></i>Go to dashboard
            </a>
            <a href="javascript:location.reload()" class="btn btn-outline-secondary rounded-pill px-4">Reload</a>
          </div>
          <div class="text-muted small mt-3">
            If the issue persists, contact support and share what you were doing.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
