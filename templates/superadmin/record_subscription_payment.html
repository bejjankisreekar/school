{% extends "base.html" %}

{% block title %}{% if payment %}Edit{% else %}Record{% endif %} subscription payment | Super Admin{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 640px;">
  <h1 class="h4 fw-bold mb-3">{% if payment %}Edit payment{% else %}Record subscription payment{% endif %}</h1>
  <form method="post" class="card border-0 shadow-sm rounded-4 p-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-primary rounded-pill">Save</button>
      <a href="{% url 'core:superadmin_subscription_payments' %}" class="btn btn-outline-secondary rounded-pill">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
